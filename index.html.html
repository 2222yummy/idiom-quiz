<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관용어 그림퀴즈</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f5f4f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem 1rem; }
.quiz-wrap { width: 100%; max-width: 540px; }
h1 { text-align: center; font-size: 20px; font-weight: 600; margin-bottom: 0.5rem; color: #222; }
.subtitle { text-align: center; font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.progress { font-size: 13px; color: #888; text-align: center; margin-bottom: 1rem; }
.card { background: #fff; border: 1px solid #e5e5e0; border-radius: 16px; padding: 1.5rem; }
.scene-box { background: #f8f7f3; border-radius: 12px; padding: 1.5rem 1rem; margin-bottom: 1.25rem; min-height: 120px; display: flex; align-items: center; justify-content: center; }
.scene-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
.em { font-size: 52px; line-height: 1; }
.em-lg { font-size: 72px; line-height: 1; }
.em-xl { font-size: 90px; line-height: 1; }
.em-sm { font-size: 32px; line-height: 1; }
.vs { font-size: 13px; font-weight: 600; color: #aaa; }
.arr { font-size: 20px; color: #bbb; }
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.choice { background: #f5f4f0; border: 1px solid #e5e5e0; border-radius: 10px; padding: 0.7rem 0.75rem; font-size: 15px; cursor: pointer; text-align: center; color: #333; font-family: inherit; transition: background 0.12s; }
.choice:hover { background: #ebebeb; }
.choice.correct { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
.choice.wrong { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; }
.choice.reveal { background: #EAF3DE; border-color: #639922; color: #3B6D11; }
.fb { text-align: center; margin-top: 1rem; font-size: 15px; font-weight: 600; min-height: 22px; }
.fb.ok { color: #3B6D11; }
.fb.ng { color: #A32D2D; }
.mn { font-size: 13px; color: #888; text-align: center; margin-top: 0.5rem; }
.next-btn { display: block; margin: 1.25rem auto 0; padding: 0.6rem 2rem; font-size: 15px; background: #fff; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; font-family: inherit; }
.next-btn:hover { background: #f0f0f0; }
.result-wrap { text-align: center; padding: 2rem 1rem; }
.score-num { font-size: 52px; font-weight: 700; color: #222; }
.score-label { font-size: 15px; color: #888; margin-top: 0.25rem; }
.retry-btn { margin-top: 1.5rem; padding: 0.6rem 2rem; font-size: 15px; background: #fff; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; font-family: inherit; }
.retry-btn:hover { background: #f0f0f0; }
@keyframes speed { 0%{transform:translateX(-8px)} 50%{transform:translateX(8px)} 100%{transform:translateX(-8px)} }
.running { animation: speed 0.4s infinite; display:inline-block; }
@keyframes tilt { 0%{transform:rotate(0deg)} 100%{transform:rotate(-30deg)} }
.tilted-ear { display:inline-block; animation: tilt 0.6s ease-out forwards; }
@keyframes drop { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(30px);opacity:0} }
.dropping { display:inline-block; animation: drop 1s ease-in infinite; }
</style>
</head>
<body>
<div class="quiz-wrap">
  <h1>관용어 그림퀴즈</h1>
  <p class="subtitle">그림을 보고 어떤 관용어인지 맞혀보세요!</p>
  <div class="progress" id="pg"></div>
  <div class="card" id="card"></div>
</div>

<script>
const Q = [
  {
    idiom:"발이 넓다", meaning:"아는 사람이 많고 활동 범위가 넓다",
    scene:`<div class="scene-row">
      <svg width="55" height="65" viewBox="0 0 55 65">
        <ellipse cx="27" cy="45" rx="13" ry="18" fill="#c8a882"/>
        <ellipse cx="14" cy="30" rx="5" ry="7" fill="#c8a882"/>
        <ellipse cx="20" cy="26" rx="5" ry="7" fill="#c8a882"/>
        <ellipse cx="27" cy="24" rx="5" ry="7" fill="#c8a882"/>
        <ellipse cx="34" cy="26" rx="5" ry="7" fill="#c8a882"/>
        <ellipse cx="40" cy="30" rx="5" ry="7" fill="#c8a882"/>
      </svg>
      <span class="vs">vs</span>
      <svg width="95" height="65" viewBox="0 0 95 65">
        <ellipse cx="47" cy="45" rx="28" ry="18" fill="#c8a882"/>
        <ellipse cx="10" cy="30" rx="7" ry="9" fill="#c8a882"/>
        <ellipse cx="23" cy="24" rx="7" ry="9" fill="#c8a882"/>
        <ellipse cx="37" cy="21" rx="7" ry="9" fill="#c8a882"/>
        <ellipse cx="53" cy="21" rx="7" ry="9" fill="#c8a882"/>
        <ellipse cx="67" cy="24" rx="7" ry="9" fill="#c8a882"/>
        <ellipse cx="80" cy="30" rx="7" ry="9" fill="#c8a882"/>
      </svg>
    </div>`
  },
  {
    idiom:"손을 놓다", meaning:"하던 일을 그만두거나 포기하다",
    scene:`<div class="scene-row">
      <div style="text-align:center"><div style="font-size:46px">✊📝</div></div>
      <span class="arr">→</span>
      <div style="text-align:center; position:relative">
        <div style="font-size:46px">🖐️</div>
        <div class="dropping" style="font-size:30px; margin-top:-8px">📝</div>
      </div>
    </div>`
  },
  {
    idiom:"눈이 많다", meaning:"주위에 보는 사람이 많다",
    scene:`<div class="scene-row"><span class="em">😶</span><span class="vs">vs</span><div style="text-align:center"><div style="font-size:38px">👀👀</div><div style="font-size:38px">👀👀👀</div></div></div>`
  },
  {
    idiom:"발 벗고 나서다", meaning:"적극적으로 나서서 돕거나 행동하다",
    scene:`<div class="scene-row"><span class="em">👟</span><span class="arr">→</span><span class="em">🦶</span><span class="arr">→</span><span class="em">🙋</span></div>`
  },
  {
    idiom:"손이 크다", meaning:"씀씀이가 크고 후하다",
    scene:`<div class="scene-row"><span class="em-sm">🤏</span><span class="vs">vs</span><span class="em-xl">🤲</span></div>`
  },
  {
    idiom:"배가 아프다", meaning:"남이 잘 되는 것이 샘나고 질투가 나다",
    scene:`<div class="scene-row">
      <svg width="100" height="110" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="22" r="20" fill="#FDDEA0"/>
        <line x1="38" y1="16" x2="34" y2="12" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="62" y1="16" x2="66" y2="12" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="42" cy="22" rx="3" ry="3.5" fill="#555"/>
        <ellipse cx="58" cy="22" rx="3" ry="3.5" fill="#555"/>
        <path d="M40 31 Q50 27 60 31" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="18" y="44" width="64" height="52" rx="16" fill="#FDDEA0"/>
        <path d="M30 60 Q50 52 70 60" stroke="#e07" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M30 72 Q50 64 70 72" stroke="#e07" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M26 55 Q18 68 26 82" stroke="#c8a882" stroke-width="2" fill="none"/>
        <path d="M74 55 Q82 68 74 82" stroke="#c8a882" stroke-width="2" fill="none"/>
        <text x="75" y="52" font-size="18" text-anchor="middle">💢</text>
      </svg>
    </div>`
  },
  {
    idiom:"귀 기울이다", meaning:"열심히 집중해서 듣다",
    scene:`<div class="scene-row"><span class="em">🗣️</span><span class="arr">→</span><span class="em-xl tilted-ear">👂</span></div>`
  },
  {
    idiom:"발이 빠르다", meaning:"행동이 민첩하고 소식을 빨리 접하다",
    scene:`<div class="scene-row">
      <span class="em running">🦶</span>
      <span class="em running" style="animation-delay:0.1s">🦶</span>
      <span class="em running" style="animation-delay:0.2s">🦶</span>
      <span style="font-size:28px">⚡⚡</span>
    </div>`
  },
  {
    idiom:"눈을 붙이다", meaning:"잠깐 잠을 자다",
    scene:`<div class="scene-row">
      <div style="font-size:44px; letter-spacing:14px">👁️👁️</div>
      <span class="arr">→</span>
      <div style="font-size:44px; letter-spacing:-18px">👁️👁️</div>
    </div>`
  }
];

const ans = Q.map(q=>q.idiom);
let cur=0, sc=0, done=false;
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function choices(c){return shuffle([c,...shuffle(ans.filter(a=>a!==c)).slice(0,3)]);}
function render(){
  done=false;
  const q=Q[cur];
  const ch=choices(q.idiom);
  document.getElementById('pg').textContent=`${cur+1} / ${Q.length}`;
  document.getElementById('card').innerHTML=`
    <div class="scene-box">${q.scene}</div>
    <div class="choices">${ch.map(c=>`<button class="choice" onclick="pick(this,'${c}','${q.idiom}')">${c}</button>`).join('')}</div>
    <div class="fb" id="fb"></div>
    <div class="mn" id="mn"></div>
    <button class="next-btn" id="nb" onclick="next()" style="display:none">다음 문제 →</button>`;
}
function pick(el,chosen,correct){
  if(done)return; done=true;
  const q=Q[cur];
  document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('reveal');});
  const fb=document.getElementById('fb'), mn=document.getElementById('mn');
  if(chosen===correct){el.classList.add('correct');fb.textContent='정답이에요!';fb.className='fb ok';sc++;}
  else{el.classList.add('wrong');fb.textContent=`아쉬워요! 정답은 "${correct}"`;fb.className='fb ng';}
  mn.textContent=`뜻: ${q.meaning}`;
  document.getElementById('nb').style.display='block';
}
function next(){cur++;if(cur>=Q.length)result();else render();}
function result(){
  document.getElementById('pg').textContent='완료!';
  const msg=sc>=8?'완벽해요! 🎉':sc>=6?'잘했어요! 👍':sc>=4?'조금 더 연습해봐요!':'다시 도전해봐요!';
  document.getElementById('card').innerHTML=`<div class="result-wrap"><div class="score-num">${sc} / ${Q.length}</div><div class="score-label">${msg}</div><button class="retry-btn" onclick="restart()">다시 풀기</button></div>`;
}
function restart(){cur=0;sc=0;render();}
render();
</script>
</body>
</html>
